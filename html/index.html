<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frame Maker</title>
    <link rel="icon"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%232a323c'/%3E%3Crect x='3' y='3' width='10' height='10' fill='none' stroke='%23ffffff' stroke-width='2'/%3E%3C/svg%3E">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.23/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #preview-frame {
            --frame-bg: #FFFFFF;
            --frame-ratio: 1;
            --image-width: 100%;
            --image-height: 100%;
            --image-radius: 0px;
            aspect-ratio: 1 / 1;
            background: var(--frame-bg);
            position: relative;
            width: min(92vw, 70vh, 100%);
            max-width: 720px;
            display: grid;
            place-items: center;
            overflow: hidden;
        }

        #preview-image {
            width: var(--image-width);
            height: var(--image-height);
            object-fit: contain;
            border-radius: var(--image-radius);
        }

        #maincolor-preview {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2%;
            display: none;
        }

        #maincolor-preview.active {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
        }
    </style>
</head>

<body class="bg-base-200 text-base-content min-h-screen flex flex-col">
    <div class="navbar bg-neutral text-neutral-content shrink-0">
        <h1 class="text-2xl" data-testid="app-title">Frame Maker</h1>
    </div>
    <main class="flex-1 p-4 md:p-8">
        <section class="mb-4">
            <div class="container mx-auto">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 lg:gap-4">
                    <div class="order-2 lg:order-1">
                        <div class="form-control w-full max-w-md">
                            <input type="file" class="file-input file-input-bordered file-input-sm w-full"
                                id="inputpath" data-testid="input-file" />
                        </div>
                        <div class="flex py-4 md:p-4">
                            <div class="form-control w-full max-w-md">
                                <div class="flex justify-between items-center">
                                    <label for="frame-ratio" class="label-text">Frame Ratio</label>
                                    <span id="frame-ratio-value" class="text-sm font-mono"
                                        data-testid="frame-ratio-value">1.000</span>
                                </div>
                                <div class="grid grid-cols-3 sm:grid-cols-6 gap-2 sm:gap-1 text-xs mt-2">
                                    <button type="button" class="btn btn-xs" data-ratio="1.000"
                                        data-testid="ratio-preset-1-000">等倍</button>
                                    <button type="button" class="btn btn-xs" data-ratio="1.333"
                                        data-testid="ratio-preset-1-333">4:3</button>
                                    <button type="button" class="btn btn-xs" data-ratio="1.414"
                                        data-testid="ratio-preset-1-414">白銀比</button>
                                    <button type="button" class="btn btn-xs" data-ratio="1.500"
                                        data-testid="ratio-preset-1-500">3:2</button>
                                    <button type="button" class="btn btn-xs" data-ratio="1.618"
                                        data-testid="ratio-preset-1-618">黄金比</button>
                                    <button type="button" class="btn btn-xs" data-ratio="1.732"
                                        data-testid="ratio-preset-1-732">√3</button>
                                </div>
                                <input type="range" id="frame-ratio" min="1.000" max="1.732" step="0.001" value="1.000"
                                    class="range range-primary range-sm mt-3" data-testid="frame-ratio-slider">
                                <p id="frame-ratio-error" class="text-xs text-error min-h-4 mt-1"
                                    data-testid="frame-ratio-error"></p>
                            </div>
                        </div>
                        <div class="flex py-4 md:p-4">
                            <div class="flex flex-col items-start h-auto">
                                <div id="color-options" data-testid="color-options">
                                    <label class="label-text">背景色</label>
                                    <div class="flex items-center">
                                        <input type="radio" id="white" name="bgcolor" value="#FFFFFF"
                                            class="radio radio-primary" data-testid="bg-white" checked>
                                        <label for="white" class="ml-2">White</label>
                                    </div>
                                    <div class="flex items-center">
                                        <input type="radio" id="black" name="bgcolor" value="#000000"
                                            class="radio radio-primary" data-testid="bg-black">
                                        <label for="black" class="ml-2">Black</label>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="flex py-4 md:p-4">
                            <div class="form-control w-full max-w-md">
                                <div class="flex justify-between items-center">
                                    <label for="corner-radius" class="label-text">Corner Radius</label>
                                    <span id="corner-radius-value" class="text-sm font-mono"
                                        data-testid="corner-radius-value">0 px</span>
                                </div>
                                <input type="range" id="corner-radius" min="0" max="200" step="1" value="0"
                                    class="range range-primary range-sm mt-3" data-testid="corner-radius-slider">
                            </div>
                        </div>
                        <div class="flex py-4 md:p-4">
                            <div class="flex items-center min-h-5">
                                <input type="checkbox" id="maincolor" name="maincolor" class="checkbox checkbox-primary"
                                    data-testid="maincolor-toggle">
                                <div class="ms-2 text-sm">
                                    <label class="label-text">MainColor</label>
                                    <p class="text-xs text-base-content">画像の最下部に特徴色をつけます</p>
                                </div>
                            </div>
                        </div>

                        <button class="btn btn-primary my-4 w-full max-w-md md:mx-4" onclick="saveImage()" disabled
                            id="saveButton" data-testid="save-button">Save</button>
                        <p id="save-status" class="text-xs my-4 md:mx-4 min-h-4" data-testid="save-status">保存時に保存先を選択します
                        </p>
                    </div>

                    <div class="order-1 lg:order-2 flex justify-center items-center">
                        <span id="spinner" class="loading loading-bars loading-lg hidden"
                            data-testid="save-spinner"></span>
                        <div id="preview-frame" class="shadow-lg" data-testid="preview-frame">
                            <img id="preview-image"
                                src=".\images\imagesmode_500dp_5F6368_FILL0_wght400_GRAD0_opsz48.png"
                                alt="Preview Image" data-testid="preview-image">
                            <div id="maincolor-preview" data-testid="maincolor-preview"></div>
                        </div>
                    </div>
                </div>
            </div>


        </section>
    </main>
    <footer class="footer bg-neutral text-neutral-content p-4 mt-4 shrink-0">
        <p class="text-center">&copy; 2025-2026 goslyng-goldwyn</p>
    </footer>
    <script src="./js/func.js"></script>
</body>

</html>
