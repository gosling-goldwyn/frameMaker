<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frame Maker</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%232a323c'/%3E%3Crect x='3' y='3' width='10' height='10' fill='none' stroke='%23ffffff' stroke-width='2'/%3E%3C/svg%3E">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.23/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #preview-frame {
            --frame-bg: #FFFFFF;
            --frame-ratio: 1;
            --image-size: 100%;
            --image-radius: 0px;
            aspect-ratio: 1 / 1;
            background: var(--frame-bg);
            position: relative;
            width: min(70vh, 100%);
            max-width: 720px;
            display: grid;
            place-items: center;
            overflow: hidden;
        }

        #preview-image {
            max-width: var(--image-size);
            max-height: var(--image-size);
            object-fit: contain;
            border-radius: var(--image-radius);
        }

        #maincolor-preview {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2%;
            display: none;
        }

        #maincolor-preview.active {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
        }
    </style>
</head>

<body class="bg-base-200 text-base-content min-h-screen overflow-hidden">
    <div class="navbar bg-neutral text-neutral-content">
        <h1 class="text-2xl">Frame Maker</h1>
    </div>
    <main class="p-8">
        <section class="mb-4">
            <div class="container mx-auto min-h-screen ">
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-start-1">
                        <div class="form-control">
                            <input type="file" class="file-input file-input-bordered file-input-sm w-full max-w-xs"
                                id="inputpath" />
                        </div>
                        <div class="flex p-4">
                            <div class="form-control w-full max-w-md">
                                <div class="flex justify-between items-center">
                                    <label for="frame-ratio" class="label-text">Frame Ratio</label>
                                    <span id="frame-ratio-value" class="text-sm font-mono">1.000</span>
                                </div>
                                <div class="grid grid-cols-6 gap-1 text-xs mt-2">
                                    <button type="button" class="btn btn-xs" data-ratio="1.000">等倍</button>
                                    <button type="button" class="btn btn-xs" data-ratio="1.333">4:3</button>
                                    <button type="button" class="btn btn-xs" data-ratio="1.414">白銀比</button>
                                    <button type="button" class="btn btn-xs" data-ratio="1.500">3:2</button>
                                    <button type="button" class="btn btn-xs" data-ratio="1.618">黄金比</button>
                                    <button type="button" class="btn btn-xs" data-ratio="1.732">√3</button>
                                </div>
                                <input type="range" id="frame-ratio" min="1.000" max="1.732" step="0.001" value="1.000"
                                    class="range range-primary range-sm mt-3">
                                <p id="frame-ratio-error" class="text-xs text-error min-h-4 mt-1"></p>
                            </div>
                        </div>
                        <div class="flex p-4">
                            <div class="flex flex-col items-start h-auto">
                                <div id="color-options">
                                    <label class="label-text">背景色</label>
                                    <div class="flex items-center">
                                        <input type="radio" id="white" name="bgcolor" value="#FFFFFF" class="radio radio-primary" checked>
                                        <label for="white" class="ml-2">White</label>
                                    </div>
                                    <div class="flex items-center">
                                        <input type="radio" id="black" name="bgcolor" value="#000000" class="radio radio-primary">
                                        <label for="black" class="ml-2">Black</label>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="flex p-4">
                            <div class="flex items-center h-5">
                                <input type="checkbox" id="rounded" name="rounded" class="checkbox checkbox-primary">
                                <div class="ms-2 text-sm">
                                    <label class="label-text">Rounded</label>
                                    <p class="text-xs text-base-content">画像の角を丸くします</p>
                                </div>
                            </div>
                        </div>
                        <div class="flex p-4">
                            <div class="flex items-center h-5">
                                <input type="checkbox" id="maincolor" name="maincolor"
                                    class="checkbox checkbox-primary">
                                <div class="ms-2 text-sm">
                                    <label class="label-text">MainColor</label>
                                    <p class="text-xs text-base-content">画像の最下部に特徴色をつけます</p>
                                </div>
                            </div>
                        </div>

                        <button class="btn btn-primary my-4 mx-4" onclick="saveImage()" disabled
                            id="saveButton">Save</button>
                        <p id="save-status" class="text-xs my-4 mx-4 min-h-4">※画像はユーザーのダウンロードフォルダに保存されます</p>
                    </div>

                    <div class=" col-start-2 flex justify-center items-center">
                        <span id="spinner" class="loading loading-bars loading-lg hidden"></span>
                        <div id="preview-frame" class="shadow-lg">
                            <img id="preview-image" src=".\images\imagesmode_500dp_5F6368_FILL0_wght400_GRAD0_opsz48.png"
                                alt="Preview Image">
                            <div id="maincolor-preview"></div>
                        </div>
                    </div>
                </div>
            </div>


        </section>
    </main>
    <footer class="footer absolute bottom-0 bg-neutral text-neutral-content p-4 mt-4">
        <p class="text-center">&copy; 2025 goslyng-goldwyn</p>
    </footer>
    <script src="./js/func.js"></script>
</body>

</html>
